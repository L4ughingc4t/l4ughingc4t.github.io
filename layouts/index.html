  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: transparent; 
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #0F0;
    }
    canvas {
      position: fixed;
      top: 0; 
      left: 0; 
      z-index: -1;
      width: 100vw;
      height: 100vh;
      background: transparent;
    }
    .terminal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 92vw;
      max-width: 1050px;
      height: 80vh;
      max-height: 700px;
      padding: 2vh 3vw;
      background: rgba(0, 0, 0, 0.9);
      border: 1px solid #0F0;
      border-radius: 10px;
      box-shadow: 0 0 2vh #0F0;
      font-size: 2vh;
      white-space: pre;
      overflow: auto;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 2;
      color: #0F0;
    }
    .cursor {
      display: inline-block;
      width: 10px;
      height: 20px;
      background-color: #0F0;
      margin-left: 3px;
      animation: blink 1s infinite;
      vertical-align: bottom;
    }
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
    .controls {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 10px;
      background: rgba(0,0,0,0.8);
      text-align: center;
      z-index: 5;
    }
    .controls a {
      color: #0F0;
      text-decoration: none;
      margin: 0 10px;
      font-family: monospace;
    }
  </style>
